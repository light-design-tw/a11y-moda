name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Don't let two tag pushes race; second one waits.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyproject_version=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) != pyproject.toml version ($pyproject_version)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/a11y-moda/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the [<version>] section out of CHANGELOG.md.
          # awk: start when we hit "## [<version>]", stop at next "## [".
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::warning::CHANGELOG.md has no [$version] section; falling back to auto-generated notes."
            echo "FALLBACK=true" >> "$GITHUB_OUTPUT"
          else
            echo "FALLBACK=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect prerelease from tag (PEP 440 a/b/rc suffix)
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ (a|b|rc)[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.FALLBACK == 'false' && 'release_notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.FALLBACK == 'true' }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: dist/*
          fail_on_unmatched_files: true
